<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BOX Coach">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>BOX Coach IA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap');

:root {
  --black:   #0d0d0d;
  --dark:    #141414;
  --card:    #1a1a1a;
  --card2:   #222;
  --accent:  #ff3c00;
  --gold:    #ffc200;
  --green:   #00e87a;
  --text:    #f0ede8;
  --muted:   #666;
  --border:  #2a2a2a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; height: 100dvh; }
.screen.active { display: flex; }

/* ── STATUS BAR SPACER (iPhone notch) ── */
.safe-top { height: calc(var(--safe-top) + 8px); background: var(--dark); flex-shrink: 0; }

/* ══════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════ */
#screen-home {
  background: var(--black);
}

.home-header {
  background: var(--dark);
  border-bottom: 2px solid var(--accent);
  padding: 16px 20px 14px;
  flex-shrink: 0;
}
.home-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 32px;
  letter-spacing: 4px;
  text-transform: uppercase;
  line-height: 1;
}
.home-logo span { color: var(--accent); }
.home-tagline {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 3px;
}

.home-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  padding-bottom: calc(80px + var(--safe-bot));
}

/* Season banner */
.season-banner {
  background: linear-gradient(135deg, #1a0a00 0%, #2a1000 100%);
  border: 1px solid rgba(255,60,0,0.3);
  border-left: 4px solid var(--accent);
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.season-icon { font-size: 28px; flex-shrink: 0; }
.season-text { flex: 1; }
.season-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
}
.season-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  margin-top: 2px;
}

/* Week / day selector */
.selector-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.selector-group { flex: 1; }
.selector-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.selector-control {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border);
}
.sel-btn {
  width: 36px;
  height: 40px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.sel-btn:active { background: rgba(255,255,255,0.05); }
.sel-value {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 1px;
  color: var(--text);
}

/* Day pills */
.day-pills {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
}
.day-pill {
  flex: 1;
  padding: 10px 4px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.day-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Session card */
.session-card {
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  overflow: hidden;
  position: relative;
}
.session-card-inner {
  padding: 18px 16px;
}
.sc-type {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 4px;
}
.sc-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 28px;
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.sc-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.sc-chip {
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border: 1px solid var(--border);
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 600;
}
.sc-chip.gold { border-color: rgba(255,194,0,0.4); color: var(--gold); }
.sc-chip.green { border-color: rgba(0,232,122,0.4); color: var(--green); }

.sc-objective {
  font-size: 13px;
  color: #aaa;
  line-height: 1.5;
  margin-top: 12px;
}

.sc-blocks {
  display: flex;
  gap: 0;
  border-top: 1px solid var(--border);
  margin-top: 14px;
}
.sc-blocks .sc-block {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  border-right: 1px solid var(--border);
}
.sc-blocks .sc-block:last-child { border-right: none; }
.sc-block-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
}
.sc-block-label {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 1px;
}

.sc-cta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(255,60,0,0.08);
  border-top: 1px solid rgba(255,60,0,0.2);
  cursor: pointer;
}
.sc-cta-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
}

/* Generate button */
.gen-btn {
  width: 100%;
  padding: 18px;
  background: var(--accent);
  border: none;
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 17px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 12px;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.gen-btn:active { opacity: 0.85; }
.gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.empty-state.show { display: block; }
.empty-icon { font-size: 52px; margin-bottom: 14px; }
.empty-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22
