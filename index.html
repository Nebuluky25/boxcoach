<!DOCTYPE html>
<html lang="es">
<head>
    <!-- ... (tu sección HEAD y CSS se mantienen intactas) ... -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOX COACH — Generador IA de Sesiones</title>
    <!-- (Mantén aquí todo tu bloque de <style> original) -->
</head>
<body>

<header>
    <div class="logo">BOX<span>.</span>COACH</div>
    <div class="tagline">IA Generador de Sesiones — Modo Verano</div>
</header>

<div class="main-content">
    <div class="week-selector">
        <button class="week-btn" onclick="changeWeek(-1)">−</button>
        <div class="week-info">
            <div class="week-label">Semana</div>
            <div class="week-number" id="week-display">S1</div>
        </div>
        <button class="week-btn" onclick="changeWeek(1)">+</button>
    </div>

    <div class="day-pills">
        <div class="day-pill active" id="day-0" onclick="selectDay(0)">Lun</div>
        <div class="day-pill" id="day-1" onclick="selectDay(1)">Mar</div>
        <div class="day-pill" id="day-2" onclick="selectDay(2)">Mié</div>
        <div class="day-pill" id="day-3" onclick="selectDay(3)">Jue</div>
    </div>

    <div class="error-state" id="error-state">
        <div class="error-title">⚠️ Error de Conexión</div>
        <div class="error-text">No se pudo generar la sesión. Verifica tu conexión.</div>
        <button class="retry-btn" onclick="generateSession()">Reintentar</button>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generateSession()">
        <span id="gen-text">GENERAR SESIÓN IA</span>
    </button>

    <div class="loading-state" id="loading">
        <div class="loading-spinner">⚙️</div>
        <div class="loading-text">Generando...</div>
        <div class="loading-phase" id="loading-phase">Preparando carga de trabajo</div>
    </div>

    <div class="session-card" id="session-card">
        <!-- (Tu estructura de .session-card se mantiene aquí) -->
        <div class="session-header">
            <div class="session-day" id="session-day">Lunes · Semana 1</div>
            <div class="session-name" id="session-name">—</div>
            <div class="session-meta">
                <span class="meta-chip" id="meta-pattern">Full Body</span>
                <span class="meta-chip gold">☀ Verano</span>
            </div>
        </div>
        <!-- Bloques ID: session-objetivo, cal-time, cal-content, etc. -->
    </div>
</div>

<script>
    // ESTADO
    let state = { week: 1, day: 0, sessions: {} };

    // CARGA DE DATOS
    const saved = localStorage.getItem('boxcoach-data');
    if (saved) state = JSON.parse(saved);

    function save() { localStorage.setItem('boxcoach-data', JSON.stringify(state)); }

    function changeWeek(d) {
        state.week = Math.max(1, state.week + d);
        document.getElementById('week-display').textContent = 'S' + state.week;
        updateUI();
    }

    function selectDay(i) {
        state.day = i;
        document.querySelectorAll('.day-pill').forEach((p, idx) => p.classList.toggle('active', idx === i));
        updateUI();
    }

    function updateUI() {
        const key = `S${state.week}D${state.day}`;
        if (state.sessions[key]) {
            renderSession(state.sessions[key]);
            document.getElementById('session-card').classList.add('show');
            document.getElementById('gen-text').textContent = 'REGENERAR SESIÓN';
        } else {
            document.getElementById('session-card').classList.remove('show');
            document.getElementById('gen-text').textContent = 'GENERAR SESIÓN IA';
        }
    }

    // LÓGICA DE GENERACIÓN (Aquí debes conectar con tu backend)
    async function generateSession() {
        // ... (Tu lógica de fetch aquí)
        // Tras recibir el JSON:
        const key = `S${state.week}D${state.day}`;
        state.sessions[key] = sessionData; // sessionData es el JSON parseado
        save();
        updateUI();
    }

    // RENDERIZADO
    function renderSession(s) {
        document.getElementById('session-name').textContent = s.nombre;
        document.getElementById('session-objetivo').textContent = s.objetivo;
        // ... (resto de tus elementos de renderizado)
    }

    // Inicializar
    updateUI();
</script>

</body>
</html>
