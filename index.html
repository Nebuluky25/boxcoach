<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX.COACH Pro v2</title>
    <style>
        :root { --black: #0d0d0d; --accent: #ff3c00; --gold: #ffc200; --text: #f5f5f7; --card: #1c1c1e; }
        body { background: var(--black); color: var(--text); font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); }
        h2 { color: var(--accent); margin-top: 0; text-transform: uppercase; }
        .data { font-size: 15px; line-height: 1.8; margin-top: 15px; }
        .btn-gen { width: 100%; padding: 20px; background: var(--gold); border: none; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Box Coach Pro</h2>
    <div class="card">
        <h2 id="title">Generando sesión...</h2>
        <div class="data" id="content"></div>
    </div>
    <button class="btn-gen" onclick="generarEntrenamiento()">🔄 GENERAR NUEVO ENTRENAMIENTO</button>

    <script>
        function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generarEntrenamiento() {
            const formatos = [
                { nombre: "AMRAP 18 min", desc: "Máximas rondas posibles en 18 minutos." },
                { nombre: "EMOM 20 min", desc: "Minuto 1: Cardio | Minuto 2: Fuerza | Minuto 3: Core | Minuto 4: Descanso." },
                { nombre: "TABATA Protocol", desc: "8 rondas de 20s trabajo / 10s descanso por ejercicio. Total 32 min." },
                { nombre: "FOR TIME", desc: "Completar todo lo más rápido posible." },
                { nombre: "CHIPPER", desc: "Realizar una lista de ejercicios sin repetir, por tiempo total." },
                { nombre: "COMPLEX TABATA", desc: "4 ejercicios seguidos en formato Tabata (20s/10s) sin descanso entre ellos." }
            ];

            const wups = [
                "3 rondas: 200m Run + 15 Air Squats + 10 Push-ups",
                "2 rondas: 30s Plancha + 20 KB Swings + 10 Scapular Pull-ups",
                "4 min AMRAP: 10 Sit-ups + 10 Burpees + 10 Lunges",
                "Movilidad: 3 min Foam Roller + 20 Banded Pull-aparts"
            ];

            const skills = [
                { e: "Back Squat", p: "5 series x 5 reps @ 75% 1RM (Descanso 120s)" },
                { e: "Strict Press", p: "4 series x 8 reps (Descanso 90s)" },
                { e: "Deadlift", p: "3 series x 10 reps @ 70% 1RM (Descanso 120s)" },
                { e: "Push Jerk", p: "5 series x 3 reps (Descanso 90s)" }
            ];

            const wods = [
                "21-15-9: Thrusters (40/30kg) + Pull-ups",
                "100 Wall Balls + 50 Box Jumps (60/50cm)",
                "5 rondas: 10 Power Cleans + 20 Sit-ups + 30 Double Unders",
                "400m Run + 15 Toes to Bar + 15 Kettlebell Snatches"
            ];

            const f = random(formatos);
            const w = random(wups);
            const s = random(skills);
            const wp = random(wods);

            document.getElementById('title').innerText = f.nombre;
            document.getElementById('content').innerHTML = `
                <strong>1. WARM-UP:</strong> ${w}<br>
                <strong>2. STRENGTH/SKILL:</strong> ${s.e} -> ${s.p}<br>
                <strong>3. WOD (${f.nombre}):</strong> ${wp}<br>
                <strong>4. METAS:</strong> ${f.desc}
            `;
        }
        generarEntrenamiento();
    </script>
</body>
</html>
