<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOX Coach IA</title>
<style>
  :root { --black: #0d0d0d; --accent: #ff3c00; --text: #f0ede8; --card: #1a1a1a; }
  body { background: var(--black); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
  .btn { background: var(--accent); color: white; border: none; padding: 15px 30px; font-weight: bold; font-size: 16px; margin-top: 20px; width: 100%; cursor: pointer; }
  .box { background: var(--card); border: 1px solid #2a2a2a; padding: 15px; margin-top: 20px; text-align: left; display: none; }
  h1 { color: var(--accent); font-size: 28px; }
</style>
</head>
<body>

  <h1>BOX.COACH</h1>
  <p>Generador Local para iPhone</p>

  <button class="btn" id="btn" onclick="generar()">GENERAR SESIÓN</button>

  <div class="box" id="resultado">
    <h3 id="wod-titulo" style="color:var(--accent); margin-bottom:10px;"></h3>
    <p><strong>Estructura:</strong> <span id="wod-tipo"></span></p>
    <p><strong>Calentamiento:</strong> 3 Rondas de 200m carrera + movilidad articular.</p>
    <p><strong>Fuerza:</strong> EMOM 15 min (8 DB Thrusters / 10 Renegade Rows).</p>
    <p><strong>WOD:</strong> AMRAP 18 min (15 KB Swings, 12 Burpees, 60 Saltos comba).</p>
  </div>

<script>
function generar() {
  const btn = document.getElementById('btn');
  const box = document.getElementById('resultado');
  
  btn.textContent = 'CREANDO...';
  
  setTimeout(() => {
    document.getElementById('wod-titulo').textContent = '🔥 FUEGO DE VERANO';
    document.getElementById('wod-tipo').textContent = 'Gymnastics + Metcon';
    box.style.display = 'block';
    btn.textContent = 'REGENERAR SESIÓN';
  }, 1000);
}
</script>
</body>
</html>
