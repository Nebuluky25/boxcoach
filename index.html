<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOX.COACH | PRO Planner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');
        :root { --black: #0d0d0d; --dark: #141414; --card: #1a1a1a; --accent: #ff3c00; --gold: #ffc200; --green: #00e87a; --text: #f0ede8; --muted: #666; --border: #2a2a2a; }
        body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; min-height: 100dvh; }
        .logo { font-family: 'Barlow Condensed'; font-weight: 900; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; text-align: center; margin-bottom: 20px; }
        .logo span { color: var(--accent); }
        .week-selector { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 12px; }
        .week-btn { background: var(--accent); border: none; color: white; width: 36px; height: 36px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .week-info { flex: 1; text-align: center; font-family: 'Barlow Condensed'; font-size: 28px; font-weight: 900; color: var(--gold); }
        .day-pills { display: flex; gap: 6px; margin-bottom: 18px; }
        .day-pill { flex: 1; padding: 12px 6px; background: var(--card); border: 1px solid var(--border); color: var(--muted); text-align: center; font-family: 'Barlow Condensed'; font-weight: 700; cursor: pointer; border-radius: 8px; }
        .day-pill.active { background: var(--accent); border-color: var(--accent); color: white; }
        .gen-btn { width: 100%; padding: 16px; background: var(--accent); border: none; color: white; font-weight: 900; text-transform: uppercase; cursor: pointer; border-radius: 10px; margin-bottom: 18px; }
        .session-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: none; }
        .session-card.show { display: block; }
        .block-title { color: var(--accent); font-family: 'Barlow Condensed'; font-weight: 700; margin-top: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .content { font-size: 14px; color: #ccc; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="logo">BOX<span>.</span>COACH</div>

    <div class="week-selector">
        <button class="week-btn" onclick="changeWeek(-1)">−</button>
        <div class="week-info" id="week-display">SEMANA 1</div>
        <button class="week-btn" onclick="changeWeek(1)">+</button>
    </div>

    <div class="day-pills">
        <div class="day-pill active" onclick="selectDay(0, this)">LUN</div>
        <div class="day-pill" onclick="selectDay(1, this)">MAR</div>
        <div class="day-pill" onclick="selectDay(2, this)">MIÉ</div>
        <div class="day-pill" onclick="selectDay(3, this)">JUE</div>
    </div>

    <button class="gen-btn" onclick="generateSession()">GENERAR SESIÓN</button>

    <div id="session-card" class="session-card">
        <h2 id="res-title" style="font-family:'Barlow Condensed'; color:var(--gold);">Sesión</h2>
        <div class="block-title">CALENTAMIENTO</div>
        <div class="content" id="c-cal"></div>
        <div class="block-title">FUERZA</div>
        <div class="content" id="c-str"></div>
        <div class="block-title">WOD</div>
        <div class="content" id="c-wod"></div>
    </div>

    <script>
        const db = {
            cals: ["9' Movilidad + 3 rondas (200m Run + 15 Air Squat)", "10' Row + Activación de hombro con banda", "500m Remo + 3 series de 10 inchworms"],
            strs: ["Back Squat: 5x5 al 75% 1RM", "Press Banca: 4x8 Tempo", "Peso Muerto: 3x10 Explosivo", "Push Press: 5x6"],
            wods: ["AMRAP 20': 15 Burpees, 20 KB Swings", "EMOM 20': 12 Cal Row, 15 Wall Balls", "For Time: 50-40-30-20-10 Sit-ups"]
        };

        let state = { week: 1, day: 0, sessions: {} };
        const saved = localStorage.getItem('bc_full_data');
        if (saved) state = JSON.parse(saved);

        function changeWeek(d) {
            state.week = Math.max(1, state.week + d);
            document.getElementById('week-display').innerText = "SEMANA " + state.week;
            render();
        }

        function selectDay(i, el) {
            state.day = i;
            document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const key = `S${state.week}D${state.day}`;
            const s = state.sessions[key];
            const card = document.getElementById('session-card');
            if (s) {
                document.getElementById('res-title').innerText = "Sesión " + key;
                document.getElementById('c-cal').innerText = s.cal;
                document.getElementById('c-str').innerText = s.str;
                document.getElementById('c-wod').innerText = s.wod;
                card.classList.add('show');
            } else {
                card.classList.remove('show');
            }
        }

        function generateSession() {
            const key = `S${state.week}D${state.day}`;
            state.sessions[key] = {
                cal: db.cals[Math.floor(Math.random() * db.cals.length)],
                str: db.strs[Math.floor(Math.random() * db.strs.length)],
                wod: db.wods[Math.floor(Math.random() * db.wods.length)]
            };
            localStorage.setItem('bc_full_data', JSON.stringify(state));
            render();
        }

        render();
    </script>
</body>
</html>
