<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX.COACH Pro</title>
    <style>
        :root { --black: #0d0d0d; --accent: #ff3c00; --gold: #ffc200; --text: #f5f5f7; --card: #1c1c1e; }
        body { background: var(--black); color: var(--text); font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        h2 { color: var(--accent); margin-top: 0; text-transform: uppercase; }
        .data { font-size: 14px; line-height: 1.6; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 10px; }
        .pill-row { display: flex; gap: 5px; margin-bottom: 15px; }
        .pill { flex: 1; text-align: center; padding: 10px; background: #333; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Box Coach Pro</h2>
    <div class="pill-row" id="days">
        <div class="pill" onclick="setDay(0)">L</div>
        <div class="pill" onclick="setDay(1)">M</div>
        <div class="pill" onclick="setDay(2)">X</div>
        <div class="pill" onclick="setDay(3)">J</div>
    </div>

    <div class="card">
        <h2 id="title">Selecciona un día</h2>
        <div class="data" id="content"></div>
    </div>
    <button onclick="generate()">GENERAR NUEVO WOD</button>

    <script>
        const formatos = ["AMRAP 20m", "EMOM 20m", "TABATA 8m", "FOR TIME", "CHIPPER", "FOR QUALITY"];
        const wups = [
            "3 rondas: 200m Trote + 15 Air Squats + 10 Push-ups",
            "3 rondas: 30s Plancha + 15 KB Swings ligeros + 10 Lunges",
            "4 rondas: 10 Burpees + 10 Sit-ups + 10 Scapular Pull-ups"
        ];
        const skills = [
            { e: "Back Squat", p: "5 series de 5 reps @ 75% 1RM (Descanso 2m)" },
            { e: "Strict Press", p: "4 series de 8 reps (Descanso 90s)" },
            { e: "Deadlift", p: "5 series de 3 reps @ 80% 1RM (Descanso 2m)" },
            { e: "Pull-ups", p: "4 series de Máximas reps (Descanso 90s)" }
        ];
        const wodParts = [
            "21-15-9 de: Thrusters (40kg/30kg) + Pull-ups",
            "100 Wall Balls + 50 Burpees sobre la barra",
            "5 rondas de: 10 Power Cleans + 15 Box Jumps + 20 Sit-ups",
            "400m Run + 30 Kettlebell Swings + 20 Goblet Squats"
        ];

        function setDay(i) { generate(i); }

        function generate(dayIdx = 0) {
            const f = formatos[Math.floor(Math.random() * formatos.length)];
            const w = wups[Math.floor(Math.random() * wups.length)];
            const s = skills[Math.floor(Math.random() * skills.length)];
            const wp = wodParts[Math.floor(Math.random() * wodParts.length)];

            document.getElementById('title').innerText = "Día " + (dayIdx + 1) + ": " + f;
            document.getElementById('content').innerHTML = `
                <p><strong>1. WARM-UP:</strong><br>${w}</p>
                <p><strong>2. SKILL/FUERZA:</strong><br>${s.e}: ${s.p}</p>
                <p><strong>3. WOD (${f}):</strong><br>${wp}</p>
                <p><strong>4. RECOVERY:</strong><br>3m estiramiento estático + 2m Foam Roller.</p>
            `;
        }
        generate();
    </script>
</body>
</html>
