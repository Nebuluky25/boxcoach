<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BOX COACH">
    <meta name="theme-color" content="#0d0d0d">
    <title>BOX COACH — Generador IA Profesional</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap');

        :root {
            --black: #0d0d0d; --dark: #141414; --card: #1a1a1a; --card2: #222;
            --accent: #ff3c00; --gold: #ffc200; --green: #00e87a;
            --text: #f0ede8; --muted: #666; --border: #2a2a2a;
            --safe-top: env(safe-area-inset-top, 0px); --safe-bot: env(safe-area-inset-bottom, 0px);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; overflow-x: hidden; }
        
        .screen { display: none; flex-direction: column; height: 100dvh; }
        .screen.active { display: flex; }
        .safe-top { height: calc(var(--safe-top) + 8px); background: var(--dark); flex-shrink: 0; }

        /* Componentes básicos */
        .home-header, .sess-header, .hist-header, .set-header { background: var(--dark); border-bottom: 2px solid var(--accent); padding: 16px 20px; flex-shrink: 0; }
        .home-body, .sess-body, .hist-body, .set-body { flex: 1; overflow-y: auto; padding-bottom: calc(80px + var(--safe-bot)); }
        
        /* Estilos específicos que ya tenías definidos en tu prompt anterior */
        .gen-btn { width: 100%; padding: 18px; background: var(--accent); border: none; color: white; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 17px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .day-pills { display: flex; gap: 6px; margin-bottom: 20px; }
        .day-pill { flex: 1; padding: 10px 4px; background: var(--card); border: 1px solid var(--border); color: var(--muted); font-family: 'Barlow Condensed'; font-weight: 700; cursor: pointer; text-align: center; }
        .day-pill.active { background: var(--accent); color: white; }
        
        .loading-overlay { display: none; flex-direction: column; align-items: center; padding: 50px 20px; gap: 20px; }
        .loading-overlay.show { display: flex; }
        .loading-bar { height: 3px; width: 100%; background: var(--accent); animation: loadslide 1.4s infinite; }
        @keyframes loadslide { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bot); z-index: 200; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; color: var(--muted); border: none; background: none; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
    <div class="safe-top"></div>
    <div class="home-header"><div style="font-family:'Barlow Condensed'; font-weight:900; font-size:32px;">BOX<span style="color:var(--accent)">.</span>COACH</div></div>
    <div class="home-body" style="padding:20px;">
        <div class="day-pills">
            <div class="day-pill active" onclick="selectDay(0)">LUN</div>
            <div class="day-pill" onclick="selectDay(1)">MAR</div>
            <div class="day-pill" onclick="selectDay(2)">MIÉ</div>
            <div class="day-pill" onclick="selectDay(3)">JUE</div>
        </div>
        <button class="gen-btn" id="gen-btn" onclick="generateSession()">Generar Sesión</button>
        <div id="loading" class="loading-overlay"><div class="loading-bar"></div><div id="loading-phase">Preparando...</div></div>
        <div id="session-preview"></div>
    </div>
</div>

<!-- SESIÓN DETALLE -->
<div class="screen" id="screen-session">
    <div class="safe-top"></div>
    <div class="sess-header"><button onclick="switchScreen('home')">←</button> <div id="detail-title"></div></div>
    <div class="sess-body" id="sess-body-content" style="padding:20px;"></div>
</div>

<!-- HISTORIAL -->
<div class="screen" id="screen-history">
    <div class="safe-top"></div>
    <div class="hist-header">Historial</div>
    <div class="hist-body" id="hist-body"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="switchScreen('home')">🏠</button>
    <button class="nav-item" id="nav-history" onclick="switchScreen('history')">📋</button>
</div>

<script>
    let state = { week: 1, day: 0, sessions: JSON.parse(localStorage.getItem('boxcoach-sessions')) || {} };

    function switchScreen(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + name).classList.add('active');
        if (name === 'history') renderHistory();
    }

    function selectDay(index) {
        state.day = index;
        document.querySelectorAll('.day-pill').forEach((p, i) => p.classList.toggle('active', i === index));
    }

    async function generateSession() {
        const btn = document.getElementById('gen-btn');
        btn.disabled = true;
        document.getElementById('loading').classList.add('show');
        
        // Simulación de llamada a API (aquí iría tu fetch de Anthropic)
        try {
            const response = await new Promise(resolve => setTimeout(() => resolve({
                nombre: "VERANO HIIT PRO", objetivo: "Intensidad alta, volumen controlado por calor.",
                calentamiento: { duracion: "9 min", items: ["1000m remo", "3 rondas de movilidad"] },
                strength: { titulo: "Back Squat", subtitulo: "Fuerza", duracion: "17 min", formato: "5x5", descripcion: "Al 75%", notas: ["Control"] },
                wod: { nombre: "SUMMER END", formato: "AMRAP", duracion: "20 min", descripcion: "20 Burpees, 30 KB Swings", score: "Rondas", notas: ["Pacing"] },
                cooldown: { duracion: "5 min", items: ["Estiramientos estáticos"] },
                calor: ["Hidratar"], escalados: ["Reducir peso"]
            }), 2000));

            const key = `S${state.week}-${state.day}`;
            state.sessions[key] = response;
            localStorage.setItem('boxcoach-sessions', JSON.stringify(state.sessions));
            document.getElementById('loading').classList.remove('show');
            btn.disabled = false;
            renderPreview(response, key);
        } catch(e) { alert("Error"); btn.disabled = false; }
    }

    function renderPreview(s, key) {
        document.getElementById('session-preview').innerHTML = `<div style="padding:20px; border:1px solid #333; margin-top:20px;"><h3>${s.nombre}</h3><button onclick="openSession('${key}')">Abrir</button></div>`;
    }

    function openSession(key) {
        const s = state.sessions[key];
        document.getElementById('sess-body-content').innerHTML = `<h2>${s.nombre}</h2><p>${s.objetivo}</p>...`;
        switchScreen('session');
    }

    function renderHistory() {
        document.getElementById('hist-body').innerHTML = Object.keys(state.sessions).map(k => `<div onclick="openSession('${k}')">${k}</div>`).join('');
    }
</script>
</body>
</html>
