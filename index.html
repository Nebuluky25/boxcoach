<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOX.COACH Pro — Final Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap');
        :root { --black: #0d0d0d; --dark: #141414; --card: #1c1c1e; --accent: #ff3c00; --gold: #ffc200; --text: #f5f5f7; --muted: #8e8e93; --border: #2c2c2e; }
        body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .logo { font-family: 'Barlow Condensed'; font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 20px; letter-spacing: 3px; }
        .logo span { color: var(--accent); }
        .nav-container { display: flex; align-items: center; justify-content: space-between; background: var(--dark); padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .day-pills { display: flex; gap: 6px; margin-bottom: 15px; }
        .pill { flex: 1; text-align: center; padding: 10px; background: var(--card); border-radius: 8px; cursor: pointer; font-family: 'Barlow Condensed'; font-weight: 700; color: var(--muted); border: 1px solid var(--border); }
        .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .section-header { color: var(--accent); font-family: 'Barlow Condensed'; font-size: 16px; text-transform: uppercase; margin-bottom: 8px; margin-top: 15px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .data-text { font-size: 14px; line-height: 1.6; color: #d1d1d6; }
        .gen-btn { width: 100%; padding: 18px; background: var(--gold); color: var(--black); border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-family: 'Barlow Condensed'; font-size: 18px; }
    </style>
</head>
<body>

    <div class="logo">BOX<span>.</span>COACH</div>

    <div class="nav-container">
        <button onclick="changeWeek(-1)" style="background:none; border:none; color:white; font-size:20px;">◀</button>
        <div id="week-display" style="font-weight:900; font-family:'Barlow Condensed'; font-size:20px; color:var(--gold);">SEMANA 1</div>
        <button onclick="changeWeek(1)" style="background:none; border:none; color:white; font-size:20px;">▶</button>
    </div>
    
    <div class="day-pills">
        <div class="pill active" onclick="setDay(0)">LUN</div>
        <div class="pill" onclick="setDay(1)">MAR</div>
        <div class="pill" onclick="setDay(2)">MIÉ</div>
        <div class="pill" onclick="setDay(3)">JUE</div>
    </div>

    <div class="card" id="content"></div>

    <button class="gen-btn" onclick="generateSession()">⚡ GENERAR SESIÓN IA</button>

    <script>
        let state = { week: 1, day: 0 };
        
        const warmups = ["3 rondas: 200m Run + 15 Air Squats + 10 Push-ups", "4 min AMRAP: 10 Sit-ups + 10 Burpees + 10 Lunges", "3 rondas: 30s Hollow Hold + 15 KB Swings + 10 Scapular Pull-ups"];
        const strength = [
            { e: "Back Squat", p: "5 sets x 5 reps @ 75% 1RM (Descanso 2m)", n: "Foco en rodillas alineadas." },
            { e: "Strict Press", p: "4 sets x 8 reps (RPE 8) (Descanso 90s)", n: "Core bloqueado, evitar arqueo." },
            { e: "Deadlift", p: "3 sets x 10 reps @ 70% 1RM (Descanso 2m)", n: "Velocidad explosiva." }
        ];
        const wods = [
            { f: "AMRAP 20'", d: "15 Wall Balls, 12 Pull-ups, 9 Burpees over Bar.", s: "Rondas + Reps" },
            { f: "EMOM 20'", d: "M1: 15 Cal Row | M2: 12 KB Snatches | M3: 15 T2B | M4: Rest.", s: "Total Reps" },
            { f: "CHIPPER", d: "100 DU + 80 Sit-ups + 60 Box Jumps + 40 DB Thrusters.", s: "Tiempo final" }
        ];

        function changeWeek(d) { state.week = Math.max(1, state.week + d); document.getElementById('week-display').innerText = "SEMANA " + state.week; render(); }
        function setDay(i) { state.day = i; document.querySelectorAll('.pill').forEach((p, idx) => p.classList.toggle('active', idx === i)); render(); }

        function render() {
            const wup = warmups[Math.floor(Math.random() * warmups.length)];
            const str = strength[Math.floor(Math.random() * strength.length)];
            const wod = wods[Math.floor(Math.random() * wods.length)];
            
            document.getElementById('content').innerHTML = `
                <div class="section-header">1. Calentamiento</div>
                <div class="data-text">${wup}</div>
                <div class="section-header">2. Fuerza / Skill</div>
                <div class="data-text"><strong>${str.e}:</strong> ${str.p}<br><em>Coach: ${str.n}</em></div>
                <div class="section-header">3. WOD (${wod.f})</div>
                <div class="data-text">${wod.d}<br><strong>Score:</strong> ${wod.s}</div>
                <div class="section-header">4. Recovery</div>
                <div class="data-text">3m estiramiento + 2m Foam Roller (Modo Verano: Hidratación constante).</div>
            `;
        }

        function generateSession() { render(); }
        render();
    </script>
</body>
</html>
