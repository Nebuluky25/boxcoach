<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BOX.COACH">
    <meta name="theme-color" content="#0d0d0d">
    <title>BOX.COACH Professional</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700&display=swap');
        
        :root {
            --black: #0d0d0d;
            --dark: #141414;
            --card: #1c1c1e;
            --accent: #ff3c00;
            --gold: #ffc200;
            --text: #f5f5f7;
            --muted: #8e8e93;
            --border: #2c2c2e;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--black);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            padding: env(safe-area-inset-top, 20px) 16px calc(env(safe-area-inset-bottom, 20px) + 20px);
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 18px;
            padding-top: 10px;
        }

        .logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 36px;
            letter-spacing: 3px;
            color: var(--text);
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-top: 1px;
        }

        .config-badge {
            background: linear-gradient(135deg, rgba(255, 60, 0, 0.15) 0%, rgba(20,20,20,1) 100%);
            border: 1px solid rgba(255, 60, 0, 0.25);
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 16px;
            color: #fff;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .config-badge span {
            color: var(--accent);
            font-weight: 700;
        }

        .btn-generate {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 19px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 60, 0, 0.4);
            transition: all 0.2s;
        }

        .btn-generate:active {
            transform: scale(0.97);
            background: #e63600;
        }

        .week-container {
            display: none;
        }

        .day-block-wrapper {
            margin-bottom: 30px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .day-tag {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--black);
            background: var(--gold);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 6px 6px 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-session {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 0 14px 14px 14px;
            padding: 18px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .wod-header {
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .wod-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text);
            letter-spacing: 0.5px;
            line-height: 1.1;
        }

        .wod-meta {
            font-size: 12px;
            color: var(--accent);
            font-weight: 700;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-row {
            background: var(--dark);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 14px;
            line-height: 1.4;
            border-left: 3px solid var(--gold);
        }

        .info-row strong {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 11px;
            display: block;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .section-block {
            margin-bottom: 14px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .section-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: var(--text);
        }

        .section-time {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            color: var(--accent);
            font-weight: 700;
            background: rgba(255, 60, 0, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .section-content {
            font-size: 13.5px;
            line-height: 1.55;
            color: #d1d1d6;
            padding: 0 4px;
        }

        .section-content ul {
            list-style: none;
        }

        .section-content li {
            margin-bottom: 8px;
            position: relative;
            padding-left: 14px;
        }

        .section-content li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        .coach-card {
            background: rgba(255, 194, 0, 0.03);
            border: 1px dashed rgba(255, 194, 0, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin-top: 14px;
        }

        .coach-card title {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .coach-card p {
            font-size: 12.5px;
            line-height: 1.5;
            color: #e5e5ea;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BOX<span>.</span>COACH</div>
        <div class="subtitle">Macro-Programación Semanal Completa</div>
    </header>

    <div class="config-badge">
        ☀️ PLANIFICACIÓN SEMANAL · <span>4 DIAS SIMULTÁNEOS</span> · FULL BODY BALANCED
    </div>

    <button class="btn-generate" onclick="generateFullWeek()">
        ⚡ GENERAR SEMANA COMPLETA
    </button>

    <div class="week-container" id="week-container">
        <!-- Los 4 días se inyectarán dinámicamente aquí -->
    </div>

    <script>
        const macroProgramacion = [
            {
                dia: "Lunes",
                nombre: "OLYMPIC PUSH & SQUAT CORE",
                tipo: "Enfoque: Cuádriceps, Deltoides, Pectoral y Core Anterior",
                estimulo: "Potencia mecánica en empujes axiales y densidad láctica en cadena anterior.",
                t_cal: "9 MINUTOS",
                c_cal: "<ul>" +
                       "<li><strong>Movilidad Avanzada (4'):</strong> Apertura de cadera en posición profunda, rotación torácica y extensión de muñecas para rack position.</li>" +
                       "<li><strong>Activación Específica (5'):</strong> 3 Rondas continuas: 150m carrera suave + 10 Sentadillas libres + 5 Pesos muertos con barra vacía + 5 Front Squats + 5 Push Press.</li>" +
                       "</ul>",
                t_str: "16 MINUTOS",
                c_str: "<ul>" +
                       "<li><strong>E2MOM (Cada 2 minutos x 8 rondas):</strong> Complejo Olímpico técnico de empuje. Carga sugerida: 60-65% 1RM.</li>" +
                       "<li><strong>El Complejo:</strong> 1 Clean desde Colgaje + 1 Front Squat + 2 Push Jerks (Unbroken).</li>" +
                       "<li><strong>Gestión 14 Atletas:</strong> Trabajo estricto en <strong>parejas obligatorias</strong> compartiendo barra (reparto de las 7 barras del Box). Atletas que dominen menos de 40kg usan obligatoriamente las 3 barras técnicas.</li>" +
                       "</ul>",
                t_wod: "20 MINUTOS",
                c_wod: "<ul>" +
                       "<li><strong>AMRAP 20 Minutos (Formato por Parejas en Bloques Espejo):</strong></li>" +
                       "<li><strong>Parejas 1 a 4 (Bloque A):</strong> 15 Kettlebell Swings Americanos (Máx 16kg) + 12 Burpees sobre el Cajón (Usa los 3 cajones disponibles, alternando saltos con step-ups si coinciden).</li>" +
                       "<li><strong>Parejas 5 a 7 (Bloque B):</strong> 60 Saltos de Comba (Simples/Dobles) + 12 Thrusters con Mancuernas (Peso moderado: 2x15kg a 2x25kg).</li>" +
                       "<li><strong>Rotación:</strong> Al terminar cada ronda completa de su bloque, cambian inmediatamente de bloque.</li>" +
                       "</ul>",
                t_clm: "5 MINUTOS",
                c_clm: "<ul>" +
                       "<li>Estiramiento pasivo en el suelo de cuádriceps, flexores de cadera y descompresión lumbar.</li>" +
                       "</ul>",
                notes: "Lunes de alta carga térmica. RPE controlado en 8/10. Vigilar la fatiga en hombros provocada por el solape de los Jerks y los Thrusters."
            },
            {
                dia: "Martes",
                nombre: "POSTERIOR CHAIN & UPPER PULL",
                tipo: "Enfoque: Isquiotibiales, Glúteos, Dorsal Ancho y Bíceps",
                estimulo: "Fuerza tracción relativa, tracción pesada de bisagra de cadera y resistencia cardiovascular.",
                t_cal: "10 MINUTOS",
                c_cal: "<ul>" +
                       "<li><strong>Warm-Up Dinámico (5'):</strong> 800m Carrera continua fraccionada (ritmo incremental cada 200m).</li>" +
                       "<li><strong>Activación de Escápulas (5'):</strong> 3 Rondas: 10 Flexiones escapulares + 10 Remo inclinado con pica + 30 segundos de Cuerda de batalla continua.</li>" +
                       "</ul>",
                t_str: "15 MINUTOS",
                c_str: "<ul>" +
                       "<li><strong>EMOM 15 Minutos (Densidad Gimnástica de Tracción Superior):</strong></li>" +
                       "<li><strong>Minuto 1:</strong> 6 a 12 Dominadas estrictas o Prone-ups (Distribución fluida de los 14 atletas: 3 en barras fijas, 2 en anillas, los 9 restantes en los 8 TRX acortados).</li>" +
                       "<li><strong>Minuto 2:</strong> 12 Giros rusos con disco (Core oblicuo) o 12 Remo inclinado pesado con mancuernas de hasta 25kg.</li>" +
                       "<li><strong>Minuto 3:</strong> 45 Segundos de Plancha isométrica invertida (Puente de glúteos estático).</li>" +
                       "</ul>",
                t_wod: "20 MINUTOS",
                c_wod: "<ul>" +
                       "<li><strong>4 Rondas por Tiempo (Time Cap: 20 Minutos) - Tracción y Cardio:</strong></li>" +
                       "<li>400 Metros de Carrera a pie (salidas en intervalos de 10 segundos para no saturar accesos).</li>" +
                       "<li>15 Pesos Muertos con barra (Usa las barras estándar libres regulando discos, máximo 75-80kg).</li>" +
                       "<li>15 Lanzamientos de Balón Medicinal al muro (Distribución de los 3 balones de 6, 9 y 12kg en relevos continuos).</li>" +
                       "</ul>",
                t_clm: "5 MINUTOS",
                c_clm: "<ul>" +
                       "<li>Estiramiento en TRX para dorsal ancho y pectoral. 2 minutos de respiración profunda controlada.</li>" +
                       "</ul>",
                notes: "Día exigente para el agarre. Limpieza constante de sudor en TRX y barras fijas. Escalar las dominadas a TRX si el atleta pierde la retracción escapular."
            },
            {
                dia: "Miércoles",
                nombre: "UNILATERAL LEG & ANTAGONIST UPPER PRESS",
                tipo: "Enfoque: Glúteo Medio, Pectoral Mayor, Tríceps y Core Estabilizador",
                estimulo: "Fuerza neural asimétrica en piernas y acondicionamiento por intervalos de tiempo.",
                t_cal: "8 MINUTOS",
                c_cal: "<ul>" +
                       "<li><strong>Movilidad Lumbar y Tobillo (4'):</strong> Estiramientos dinámicos en posición de caballero y rotaciones de tobillo.</li>" +
                       "<li><strong>Activación Lumbo-Pélvica (4'):</strong> 2 Rondas: 15 Zancadas hacia atrás al aire + 10 Flexiones de brazos en el suelo + 40 Saltos simples.</li>" +
                       "</ul>",
                t_str: "18 MINUTOS",
                c_str: "<ul>" +
                       "<li><strong>Sentadilla Trasera Pesada (Back Squat):</strong> 5 Series x 5 Repeticiones al 75% 1RM.</li>" +
                       "<li><strong>Logística Crítica de Racks:</strong> Contamos con 1 solo rack para barra pesada, asignado estrictamente a los 2 atletas que muevan más peso.</li>" +
                       "<li>Los otros 12 atletas trabajan en parejas desde el suelo: realizan un Power Clean impecable para llevar la barra a los hombros y pasarla tras la nuca de manera segura y coordinada.</li>" +
                       "</ul>",
                t_wod: "19 MINUTOS",
                c_wod: "<ul>" +
                       "<li><strong>EMOM de Alta Densidad de 18 Minutos (3 vueltas completas / Minuto 6 Descanso):</strong></li>" +
                       "<li><strong>Minuto 1:</strong> 16 Zancadas caminando con mancuernas (Carga unilateral/Goblet).</li>" +
                       "<li><strong>Minuto 2:</strong> 12 Press de Banca plano con mancuernas (Usa los 2 bancos planos disponibles en rotación rápida, el resto trabaja Floor Press en colchoneta).</li>" +
                       "<li><strong>Minuto 3:</strong> 15 Flexiones de brazos estrictas (Push-ups).</li>" +
                       "<li><strong>Minuto 4:</strong> 45 Segundos de golpeos potentes con Cuerda de batalla.</li>" +
                       "<li><strong>Minuto 5:</strong> Máximos saltos o step-ups a los 3 cajones pliométricos.</li>" +
                       "<li><strong>Minuto 6:</strong> DESCANSO TOTAL OBLIGATORIO (Control de FC e hidratación).</li>" +
                       "</ul>",
                t_clm: "5 MINUTOS",
                c_clm: "<ul>" +
                       "<li>Estiramiento del psoas profundo (Couch stretch) y liberación miofascial plantar con pelota rígida.</li>" +
                       "</ul>",
                notes: "El minuto 6 es vital para vaciar el lactato acumulado debido a la alta humedad estival. Monitorear transiciones en los bancos planos."
            },
            {
                dia: "Jueves",
                nombre: "METCON ENDURANCE & FULL-BODY BURN",
                tipo: "Enfoque: Cadena Posterior Global, Hombros, Core Completo",
                estimulo: "Resistencia cardiovascular general, lavado de lactato y vaciado de glucógeno semanal.",
                t_cal: "9 MINUTOS",
                c_cal: "<ul>" +
                       "<li><strong>Warm-Up General (4'):</strong> 200m Carrera suave + 10 Caminatas de gusano (Inchworms) con flexión.</li>" +
                       "<li><strong>Warm-Up Específico (5'):</strong> 3 Rondas rápidas de: 10 Remos inclinados ligeros + 10 Sentadillas de sumo con kettlebell + 15 saltos dobles/simples.</li>" +
                       "</ul>",
                t_str: "16 MINUTOS",
                c_str: "<ul>" +
                       "<li><strong>Superserie de Densidad Estructural por Intervalos:</strong> 4 Rondas totales.</li>" +
                       "<li>Trabajo estricto de 90 segundos por ejercicio / 30 segundos de descanso entre ellos:</li>" +
                       "<li><strong>Ejercicio A:</strong> Peso Muerto Rumano pesado con barra (Carga media controlada) o Mancuernas grandes buscando máxima elongación de isquiotibiales.</li>" +
                       "<li><strong>Ejercicio B:</strong> Remo Invertido en TRX (Cuerpo a 45° o más horizontal) manteniendo retracción escapular perfecta.</li>" +
                       "</ul>",
                t_wod: "20 MINUTOS",
                c_wod: "<ul>" +
                       "<li><strong>WOD: 'The Weekly Finisher' · Formato FOR TIME (Time Cap: 20 Minutos):</strong></li>" +
                       "<li>Diseño de circuito largo para quemar grasa y resistencia general de todo el cuerpo:</li>" +
                       "<li>• 80 Kettlebell Sumo Deadlift High Pulls (Carga ligera de 16kg o 12kg).</li>" +
                       "<li>• 60 Dominadas / Remo colgado o Remo en TRX en estaciones compartidas.</li>" +
                       "<li>• 40 Zancadas en el sitio con un Balón Medicinal abrazado al pecho (6, 9 o 12kg).</li>" +
                       "<li>• 20 Burpees limpios tocando el pecho en el suelo.</li>" +
                       "<li><strong>Logística Anti-Atascos (14 Atletas):</strong> La mitad de la clase (7 atletas) inicia el WOD en orden inverso (comenzando en los 20 burpees y subiendo hacia las kettlebells) para que el material fluya libremente sin interrupciones.</li>" +
                       "</ul>",
                t_clm: "5 MINUTOS",
                c_clm: "<ul>" +
                       "<li>Vuelta a la calma con estiramientos asistidos generales de tren superior e inferior y 2 minutos de respiración cuadrada de relajación.</li>" +
                       "</ul>",
                notes: "Ritmo constante autorregulado (RPE 7.5/10). Ideal para terminar la semana limpios de rigidez articular, balanceando el esfuerzo muscular acumulado."
            }
        ];

        function generateFullWeek() {
            const container = document.getElementById('week-container');
            container.innerHTML = ''; // Limpiar ejecuciones previas

            macroProgramacion.forEach((data) => {
                const dayHTML = `
                    <div class="day-block-wrapper">
                        <div class="day-tag">${data.dia}</div>
                        <div class="card-session">
                            <div class="wod-header">
                                <div class="wod-title">${data.nombre}</div>
                                <div class="wod-meta">${data.tipo}</div>
                            </div>

                            <div class="info-row">
                                <strong>Estímulo Fisiológico:</strong>
                                <span>${data.estimulo}</span>
                            </div>

                            <!-- Calentamiento -->
                            <div class="section-block">
                                <div class="section-header">
                                    <span class="section-name">1. Calentamiento (Warm-Up)</span>
                                    <span class="section-time">${data.t_cal}</span>
                                </div>
                                <div class="section-content">${data.c_cal}</div>
                            </div>

                            <!-- Fuerza -->
                            <div class="section-block">
                                <div class="section-header">
                                    <span class="section-name">2. Bloque de Fuerza / Potencia</span>
                                    <span class="section-time">${data.t_str}</span>
                                </div>
                                <div class="section-content">${data.c_str}</div>
                            </div>

                            <!-- WOD -->
                            <div class="section-block">
                                <div class="section-header">
                                    <span class="section-name">3. WOD (Alta Intensidad)</span>
                                    <span class="section-time">${data.t_wod}</span>
                                </div>
                                <div class="section-content">${data.c_wod}</div>
                            </div>

                            <!-- Vuelta a la calma -->
                            <div class="section-block">
                                <div class="section-header">
                                    <span class="section-name">4. Vuelta a la calma / Movilidad</span>
                                    <span class="section-time">${data.t_clm}</span>
                                </div>
                                <div class="section-content">${data.c_clm}</div>
                            </div>

                            <!-- Notas del Coach -->
                            <div class="coach-card">
                                <title>Logística para 14 Atletas y Estrategia</title>
                                <p>${data.notes}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', dayHTML);
            });

            container.style.display = 'block';
            
            // Hacer scroll suave automático al inicio del lunes generado
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
